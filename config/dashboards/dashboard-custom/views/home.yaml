path: home
title: Home
theme: "Google Home Dark"
hide_header: true
hide_sidebar: true
cards:
#-----------------------------------------
  - type: vertical-stack
    cards:
      - type: custom:bubble-card
        card_type: pop-up
        icon: mdi:human-female-girl
        hash: '#Rach'
        name: Rachel
        auto-close: 10000          
      
      - type: vertical-stack
        cards:
          - type: custom:mushroom-person-card
            entity: person.rachel
            name: Rachel
            secondary_info: state
            tap_action:
              action: none
              
          - type: map
            entities:
              - person.rachel
            default_zoom: 15
            hours_to_show: 6

          - type: custom:mushroom-chips-card
            chips:
              # 🔋 Battery (templated + coloured)
              - type: template
                entity: sensor.iphone_battery_level
                content: "{{ states('sensor.iphone_battery_level') }}%"
                icon: mdi:battery
                icon_color: >
                  {% set lvl = states('sensor.iphone_battery_level')|int(0) %}
                  {% if lvl < 20 %} red
                  {% elif lvl < 50 %} orange
                  {% else %} green
                  {% endif %}

              # ⚡ Charging state
              - type: template
                entity: sensor.iphone_battery_state
                content: "{{ states('sensor.iphone_battery_state') }}"
                icon: >
                  {% if states('sensor.iphone_battery_state') == 'Charging' %}
                    mdi:battery-charging
                  {% else %}
                    mdi:battery
                  {% endif %}
                icon_color: >
                  {% if states('sensor.iphone_battery_state') == 'Charging' %}
                    green
                  {% else %}
                    disabled
                  {% endif %}

              # 📍 Location
              - type: template
                entity: sensor.iphone_geocoded_location
                content: "{{ states('sensor.iphone_geocoded_location') }}"
                icon: mdi:map-marker

              # 📶 Wi-Fi (BSSID-based)
              - type: template
                entity: sensor.iphone_ssid
                content: >
                  {% if states('sensor.iphone_ssid') in ['unknown','unavailable','Not Connected'] %}
                    No Wi-Fi
                  {% else %}
                    Wi-Fi Connected
                  {% endif %}
                icon: mdi:wifi
                icon_color: >
                  {% if states('sensor.iphone_ssid') in ['unknown','unavailable','Not Connected'] %}
                    disabled
                  {% else %}
                    blue
                  {% endif %}
              - type: template
                entity: person.rachel
                icon: mdi:map-marker-distance
                content: >
                  {% set d = distance('person.rachel','zone.home') %}
                  {% if d is not none %}
                    {{ d | round(1) }} km
                  {% else %}
                    —
                  {% endif %}


  - type: vertical-stack
    cards:
      - type: custom:bubble-card
        card_type: pop-up
        icon: mdi:human-male-girl
        hash: '#Nike'
        name: Nikesh
        auto-close: 10000

      - type: vertical-stack
        cards:
          - type: custom:mushroom-person-card
            entity: person.nikesh
            name: Nikesh
            secondary_info: state
            tap_action:
              action: none
              
          - type: map
            entities:
              - person.nikesh
            default_zoom: 15
            hours_to_show: 6
          
          - type: custom:mushroom-chips-card
            chips:
              # 🔋 Battery
              - type: template
                entity: sensor.pixel_8_battery_level
                content: "{{ states('sensor.pixel_8_battery_level') }}%"
                icon: mdi:battery
                icon_color: >
                  {% set lvl = states('sensor.pixel_8_battery_level')|int(0) %}
                  {% if lvl < 20 %} red
                  {% elif lvl < 50 %} orange
                  {% else %} green
                  {% endif %}

              # ⚡ Battery state
              - type: template
                entity: sensor.pixel_8_battery_state
                content: "{{ states('sensor.pixel_8_battery_state') }}"
                icon: >
                  {% if states('sensor.pixel_8_battery_state') == 'charging' %}
                    mdi:battery-charging
                  {% else %}
                    mdi:battery
                  {% endif %}
                icon_color: >
                  {% if states('sensor.pixel_8_battery_state') == 'charging' %}
                    green
                  {% else %}
                    disabled
                  {% endif %}

              # 🔌 Charger type
              - type: template
                entity: sensor.pixel_8_charger_type
                content: >
                  {% if states('sensor.pixel_8_charger_type') in ['unknown','unavailable'] %}
                    On Battery
                  {% else %}
                    {{ states('sensor.pixel_8_charger_type') }}
                  {% endif %}
                icon: mdi:power-plug
              - type: template
                entity: person.nikesh
                icon: mdi:map-marker-distance
                content: >
                  {% set d = distance('person.nikesh','zone.home') %}
                  {% if d is not none %}
                    {{ d | round(1) }} km
                  {% else %}
                    —
                  {% endif %}





  - type: custom:bubble-card
    card_type: button
    button_type: name
    entity: light.all_lights
    icon: mdi:lightbulb
    name: Lights
    show_state: true
    tap_action:
      action: navigate
      navigation_path: /dashboard-custom/lights
    styles: |
      * { font-size: 18px !important; }
      .bubble-icon { --mdc-icon-size: 30px !important; }
      :host { --bubble-main-background-color: rgba(35,35,40,0.85); --bubble-border-radius: 24px; --bubble-card-box-shadow: 0 4px 8px rgba(0,0,0,0.4); }
      .is-on { --bubble-button-background-color: #87CEEB; --bubble-card-box-shadow: 0 0 20px 4px rgba(255,255,0,0.6); }
 
