path: radiators
title: Radiators
theme: "Google Home Dark"
hide_header: true
hide_sidebar: true

cards:

  #################################################
  #                    POP-UPS                   #
  #################################################

  # --- Bedroom Pop-up ---
  - type: vertical-stack
    cards:
      - type: custom:bubble-card
        card_type: pop-up
        hash: '#bedroom'
        icon: mdi:heat-wave
        name: Bedroom Radiator
        auto-close: 10000
      - type: custom:bubble-card
        card_type: climate
        entity: climate.bedroom_stat
        name: Bedroom
        icon: mdi:thermometer
        show_state: true
        show_name: true
        show_icon: true
        hide_target_temp_low: true
        hide_target_temp_high: true
        step: 0.5
        min_temp: 5
        max_temp: 30
        styles: |
          :host {
            --bubble-climate-background-color: #FFA500;
          }
          .is-off {  
            --bubble-climate-background-color: #EA4335;
          }
        sub_button:
          - name: HVAC modes menu
            select_attribute: hvac_modes
            show_arrow: false
            state_background: false

