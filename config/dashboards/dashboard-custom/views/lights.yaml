path: lights
title: Lights
theme: "Google Home Dark"
hide_header: true
hide_sidebar: true

cards:

  # Ceiling color pop-up
  - type: vertical-stack
    cards:
      - type: custom:bubble-card
        card_type: pop-up
        hash: '#ceiling-color'
        name: Ceiling Color
        icon: mdi:palette
        entity: light.largest
        bg_opacity: 50
        auto_close: 15000
      - type: custom:light-entity-card
        entity: light.largest
        persist_features: true
        color_picker: true
        color_temp: true
        brightness: true

