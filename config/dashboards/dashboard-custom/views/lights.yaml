      - type: custom:bubble-card
        card_type: button
        button_type: slider
        entity: light.summer
        name: Lamp
        icon: mdi:floor-lamp
        show_state: true
        hold_action:
          action: navigate
          navigation_path: '#lamp-color'
        sub_button:
          - icon: mdi:palette
            tap_action:
              action: navigate
              navigation_path: '#lamp-color'
        styles: |
          :host {
            --bubble-main-background-color: rgba(35,35,40,0.85);
            --bubble-button-accent-color: #FB8C00;
            --bubble-border-radius: 20px;
            --bubble-card-box-shadow: 0 0 15px 3px rgba(251,140,0,0.4);
          }
          .is-on {
            --bubble-main-background-color: rgba(255,255,255,0.95);
            --bubble-card-box-shadow: 0 0 20px 5px rgba(251,140,0,0.6);
          }

