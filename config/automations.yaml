- id: '1769425293913'
  alias: 'System: Night Mode Control'
  description: Toggles Night Mode boolean based on time
  triggers:
  - trigger: time
    at: '22:30:00'
    id: activate
  - trigger: time
    at: 05:30:00
    id: deactivate
  actions:
  - action: "{% if trigger.id == 'activate' %}\n  input_boolean.turn_on\n{% else %}\n
      \ input_boolean.turn_off\n{% endif %}\n"
    target:
      entity_id: input_boolean.night_mode
  mode: single
